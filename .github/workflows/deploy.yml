name: Deploy to GitHub Pages

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v5

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '22'
          cache: 'npm'

      - name: Show environment
        run: |
          node --version
          npm --version
          ls -la

      - name: Install dependencies
        run: npm ci

      - name: Build site
        env:
          NODE_ENV: production
          ELEVENTY_ENV: production
        run: npm run build

      - name: Build search index
        run: npm run build:search

      - name: Check output folder
        run: |
          test -d _site || (echo "_site folder not found" && exit 1)
          find _site -maxdepth 2 -type f | head -100

      - name: Upload Pages artifact
        uses: actions/upload-pages-artifact@v4
        with:
          path: ./_site

  deploy:
    needs: build
    runs-on: ubuntu-latest

    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
